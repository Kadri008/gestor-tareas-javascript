<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taller DOM - Gestor de actividades</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
   <div class="contenedor">
       <h1>Gestor de Actividades Academicas</h1>
       <p class="descripcion">Agrega las actividades pendientes, marcalas como realizadas o eliminalas</p>

    <div class="formulario">
        <input type="text" id ="actividadInput" placeholder="Ejemplo: Entregar taller JavaScript">
        <button id="btnAgregar">Agregar</button>
    </div>

    <p id="mensajeError" class="mensaje-error"></p>

    <div class="resumen">
        <p>Total: <span id="listaTotalActividades">0</span></p>
        <p>Realizadas: <span id="listaTotalActividadesRealizadas">0</span></p>
        <p>Pendientes: <span id="listaTotalActividadesPendientes">0</span></p>
   </div>

   <h2>Lista de Actividades</h2>
   <p id="mensajeVacio" class="vacia">No  hay Actividades Registradas.</p>
   <ul id="listaActividades"></ul>

   </div>
   <footer class="footer">
    <p>
        &copy;<span id="year"> </span> <span> Gestor de tareas. </span>Todos los derechos reservados.
    </p>
    <p class="footer.text">
        Desarrollado por Karoll.
    </p>
   </footer>
   <script src="js/Taller-dom.js"></script>

   
</body> 
</html>
